<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CADScope</title>
  <!-- Inter font from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <h1>CADScope</h1>
      </div>
      <div class="header-links">
        <a href="https://github.com/erikbuild/CADScope" target="_blank">GitHub</a>
      </div>
    </header>

    <main class="main-content">
      <!-- Config Panel (Sidebar) -->
      <aside class="config-panel">
        <div class="config-panel-content">
          <section class="config-section">
            <h3>Assembly</h3>
            <select id="modelSelect"></select>
          </section>

          <section class="config-section">
            <button class="btn-secondary" id="copyLinkBtn">Copy Configuration URL</button>
          </section>

          <div id="colorControls" style="display:none"></div>

          <section class="config-section">
            <h3>Scene Hierarchy</h3>
            <div id="tree"></div>
          </section>
        </div>
      </aside>

      <!-- 3D Viewer -->
      <div class="viewer-container">
        <canvas id="viewer"></canvas>

        <!-- Viewer Controls -->
        <div id="viewControls">
          <button class="viewer-btn" onclick="setView('left')" title="Left">◀<br>Left</button>
          <button class="viewer-btn" onclick="setView('right')" title="Right">▶<br>Right</button>
          <button class="viewer-btn" onclick="setView('home')" title="Home">⌂<br>Home</button>
          <button class="viewer-btn" onclick="setView('top')" title="Top">▲<br>Top</button>
          <button class="viewer-btn" onclick="setView('front')" title="Front">◉<br>Front</button>
          <button class="viewer-btn" onclick="setView('iso')" title="Iso">◇<br>Iso</button>
          <button class="viewer-btn" onclick="setView('bottom')" title="Bottom">▼<br>Bottom</button>
          <button class="viewer-btn" onclick="setView('back')" title="Back">◈<br>Back</button>
          <div class="viewer-btn-separator"></div>
          <button class="viewer-btn" onclick="zoom(0.2)" title="Zoom Out">−<br>Zoom</button>
          <button class="viewer-btn" onclick="resetZoom()" title="Reset Zoom">⟳<br>Reset</button>
          <button class="viewer-btn" onclick="zoom(-0.2)" title="Zoom In">+<br>Zoom</button>
          <div class="viewer-btn-separator"></div>
          <label class="slider-label" for="brightnessSlider">Brightness</label>
          <input type="range" id="brightnessSlider" min="0" max="200" value="150" title="Brightness">
        </div>

        <!-- Loading Indicator -->
        <div class="loading-indicator" id="loadingOverlay">
          <div class="spinner-small"></div>
          <span id="loadingText">Loading model...</span>
        </div>

        <!-- Attribution -->
        <div class="attribution">
          <a href="https://github.com/erikbuild/CADScope" target="_blank">CADScope v1.1.0</a> by <a href="https://github.com/erikbuild" target="_blank">@erikbuild</a>
        </div>
      </div>
    </main>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="viewer.js"></script>
</body>
</html>
